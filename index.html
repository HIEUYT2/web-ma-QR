<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💌8/3 - 12A1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Quicksand:wght@400;500;600;700&family=Dancing+Script:wght@400;700&family=Pacifico&family=Be+Vietnam+Pro:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <style>
        /* ============================================
           RESET & MOBILE-FIRST
           ============================================ */
        :root {
            --bg-top: #080015;
            --bg-mid: #1a0636;
            --bg-bottom: #2f1952;
            --glass: rgba(255,255,255,0.1);
            --glass-border: rgba(255,255,255,0.16);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            min-height: 100%;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }

        body {
            min-height: 100dvh;
            background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 42%, var(--bg-bottom) 72%, #18052f 100%);
            color: #fff;
            position: relative;
            overscroll-behavior: none;
            overflow: hidden;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            inset: -18%;
            z-index: 0;
            pointer-events: none;
        }

        body::before {
            background:
                radial-gradient(48% 44% at 14% 20%, rgba(255, 120, 190, 0.17), transparent 72%),
                radial-gradient(35% 30% at 84% 28%, rgba(110, 180, 255, 0.14), transparent 74%),
                radial-gradient(45% 40% at 60% 86%, rgba(255, 200, 130, 0.1), transparent 76%);
            animation: skyDrift 24s ease-in-out infinite alternate;
        }

        body::after {
            background: radial-gradient(50% 60% at 50% 120%, rgba(8, 0, 25, 0.72), rgba(8, 0, 25, 0));
        }

        @keyframes skyDrift {
            from { transform: translate3d(0, 0, 0) scale(1); }
            to { transform: translate3d(-1.5%, 2%, 0) scale(1.03); }
        }

        h1, h2, h3, h4 { font-family: 'Playfair Display', serif; }

        /* ============================================
           SAO NHẤP NHÁY — CANVAS NỀN
           ============================================ */
        .stars-canvas {
            position: fixed; inset: 0;
            z-index: 0; pointer-events: none;
            opacity: 0.95;
        }

        /* ============================================
           HOA NỀN TRÔI NHẸ
           ============================================ */
        .bg-petal {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            opacity: 0.14;
            will-change: transform;
            transform: translate3d(0,0,0);
            contain: layout paint style;
            animation: bgUp linear infinite;
        }

        @keyframes bgUp {
            0%   { transform: translate3d(0, 0, 0) rotate(0deg); }
            100% { transform: translate3d(20px, -120vh, 0) rotate(200deg); }
        }

        /* ============================================
           HEADER CỐ ĐỊNH
           ============================================ */
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 200;
            text-align: center;
            padding: calc(16px + env(safe-area-inset-top)) 14px 10px;
            background: linear-gradient(180deg,
                rgba(9,0,23,0.96) 0%,
                rgba(9,0,23,0.82) 62%,
                transparent 100%);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            pointer-events: none;
        }

        .header-title {
            font-family: 'Pacifico', 'Be Vietnam Pro', 'Dancing Script', cursive;
            font-size: clamp(1.05rem, 2vw + 0.55rem, 2.05rem);
            font-weight: 400;
            letter-spacing: 0.012em;
            line-height: 1.32;
            color: #ffdee8;
            background: linear-gradient(130deg, #ff6b8a 0%, #ff8ca8 36%, #ffd4df 62%, #ff6b8a 100%);
            background-size: 230% 230%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 8px 24px rgba(0,0,0,0.45), 0 0 16px rgba(255,120,165,0.25);
            animation: titleFlow 5s ease-in-out infinite;
            white-space: normal;
            text-wrap: balance;
            max-width: min(95vw, 980px);
            margin: 5px auto 0;
            padding: 0.12em 8px 0.04em;
            overflow: visible;
            font-feature-settings: "liga" 1;
        }

        @keyframes titleFlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .header-sub {
            font-size: 0.72rem;
            color: rgba(255,241,250,0.72);
            margin-top: 4px;
            font-weight: 600;
            letter-spacing: 0.02em;
            text-shadow: 0 1px 10px rgba(34,14,62,0.5);
        }

        .header-badge {
            display: inline-block;
            margin-top: 5px;
            padding: 2px 12px;
            border-radius: 50px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 0.6rem;
            color: rgba(255,255,255,0.45);
            font-weight: 600;
        }

        /* ============================================
           VÙNG RƠI — FULL VIEWPORT
           ============================================ */
        .fall-zone {
            position: fixed;
            inset: 0;
            z-index: 10;
            overflow: hidden;
            pointer-events: none;
        }

        /* ============================================
           PHONG BÌ RƠI
           ============================================ */
        .envelope {
            position: absolute;
            width: 130px;
            border-radius: 16px;
            background: var(--glass);
            backdrop-filter: blur(9px);
            -webkit-backdrop-filter: blur(9px);
            border: 1.5px solid var(--glass-border);
            box-shadow: 0 10px 20px rgba(0,0,0,0.25);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px 8px 10px;
            cursor: pointer;
            pointer-events: auto;
            will-change: transform;
            contain: layout paint style;
            transform: translateZ(0);
            z-index: 11;

            /* Bắt đầu ở trên viewport */
            top: -140px;

            /* Animation rơi + lắc */
            animation:
                envFall var(--fall-dur) linear infinite var(--fall-delay),
                envSway var(--sway-dur) ease-in-out infinite var(--sway-delay);

            opacity: 0;
        }

        .envelope.spawned {
            opacity: 1;
        }

        /* RƠI TỪ TRÊN XUỐNG — xuyên qua viewport */
        @keyframes envFall {
            0%   { top: -140px; }
            100% { top: calc(100vh + 60px); }
        }

        /* LẮC QUA LẠI — drift nhẹ trái phải */
        @keyframes envSway {
            0%, 100% { transform: translateX(0) rotate(var(--r0)); }
            25%  { transform: translateX(var(--sx1)) rotate(calc(var(--r0) + 3deg)); }
            50%  { transform: translateX(var(--sx2)) rotate(var(--r0)); }
            75%  { transform: translateX(var(--sx3)) rotate(calc(var(--r0) - 3deg)); }
        }

        /* Glow pulse */
        .envelope::after {
            content: '';
            position: absolute; inset: -3px;
            border-radius: 19px;
            background: var(--glow);
            opacity: 0;
            z-index: -1;
            filter: blur(11px);
            animation: glowPulse 3s ease-in-out infinite var(--glow-d);
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.5; }
        }

        .envelope:active {
            transform: scale(0.92) !important;
        }

        .env-icon {
            font-size: 1.7rem;
            line-height: 1;
            margin-bottom: 2px;
        }

        .env-mail {
            font-size: 0.6rem;
            opacity: 0.35;
            margin-bottom: 1px;
        }

        .env-name {
            font-size: 0.72rem;
            font-weight: 700;
            text-align: center;
            color: #fff;
            line-height: 1.2;
            text-shadow: 0 1px 6px rgba(0,0,0,0.6);
        }

        .env-hint {
            font-size: 0.5rem;
            color: rgba(255,255,255,0.28);
            margin-top: 2px;
            font-weight: 500;
        }

        /* Đã đọc — vẫn rơi, nhưng mờ hơn */
        .envelope.read { opacity: 0.35 !important; }
        .envelope.read .env-hint { display: none; }
        .envelope.read::before {
            content: '✓';
            position: absolute;
            top: 5px; right: 7px;
            font-size: 0.6rem;
            color: #55efc4;
            font-weight: 700;
        }

        /* ============================================
           KHU VỰC ĐÃ BẮT — DƯỚI CÙNG
           ============================================ */
        .caught-tray {
            position: fixed;
            bottom: calc(56px + env(safe-area-inset-bottom));
            left: 0; right: 0;
            z-index: 50;
            display: flex;
            gap: 4px;
            padding: 0 10px;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            pointer-events: auto;
            min-height: 40px;
            align-items: center;
            scroll-snap-type: x proximity;
        }

        .caught-tray::-webkit-scrollbar { display: none; }

        .caught-chip {
            flex-shrink: 0;
            padding: 4px 10px;
            border-radius: 50px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            font-size: 0.58rem;
            font-weight: 600;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            white-space: nowrap;
            transition: transform 0.15s;
            animation: chipIn 0.3s ease both;
            scroll-snap-align: center;
        }

        .caught-chip:active { transform: scale(0.93); }

        @keyframes chipIn {
            from { transform: scale(0) translateY(10px); opacity: 0; }
            to   { transform: scale(1) translateY(0); opacity: 1; }
        }

        /* ============================================
           MODAL OVERLAY — MỞ THƯ
           ============================================ */
        .modal-overlay {
            display: none;
            position: fixed; inset: 0;
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: calc(12px + env(safe-area-inset-top)) 12px calc(12px + env(safe-area-inset-bottom));
            background: rgba(5,0,15,0);
            transition: background 0.35s ease;
        }

        .modal-overlay.show { display: flex; }
        .modal-overlay.show.fade-in { background: rgba(5,0,15,0.9); }

        /* ============================================
           PHONG BÌ 3D MỞ
           ============================================ */
        .letter-wrapper {
            width: min(360px, 92vw);
            max-height: min(82dvh, 720px);
            position: relative;
            transform: scale(0.4);
            opacity: 0;
            transition: transform 0.45s cubic-bezier(0.175,0.885,0.32,1.275), opacity 0.3s ease;
        }

        .modal-overlay.show.fade-in .letter-wrapper {
            transform: scale(1);
            opacity: 1;
        }

        .letter-wrapper.closing {
            transform: scale(0.3) !important;
            opacity: 0 !important;
            transition: transform 0.3s ease-in, opacity 0.25s ease-in;
        }

        /* Nắp phong bì */
        .env-flap {
            width: 100%; height: 70px;
            overflow: visible;
            position: relative; z-index: 5;
        }

        .env-flap-shape {
            width: 100%; height: 70px;
            clip-path: polygon(0 0, 50% 100%, 100% 0);
            border-radius: 12px 12px 0 0;
            transform-origin: top center;
            transform: rotateX(0deg);
            transition: transform 0.5s ease 0.25s;
        }

        .modal-overlay.show.fade-in .env-flap-shape {
            transform: rotateX(180deg);
        }

        /* Thân thư */
        .env-body {
            width: 100%;
            background: linear-gradient(155deg, #fffdf5 0%, #fff8ee 40%, #fff3e0 100%);
            border-radius: 0 0 14px 14px;
            position: relative;
            margin-top: -2px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.8);
            overflow: hidden;
            max-height: min(76dvh, 620px);
            overflow-y: auto;
        }

        .env-body::before {
            content: '';
            position: absolute; inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(200,180,160,0.07) 28px, rgba(200,180,160,0.07) 29px);
            pointer-events: none;
        }

        .corner { position: absolute; font-size: 0.9rem; opacity: 0.2; pointer-events: none; }
        .corner.tl { top: 8px; left: 10px; }
        .corner.tr { top: 8px; right: 10px; }
        .corner.bl { bottom: 8px; left: 10px; }
        .corner.br { bottom: 8px; right: 10px; }

        .letter-inner {
            padding: 26px 20px 22px;
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 0.4s ease 0.7s, transform 0.4s ease 0.7s;
        }

        .modal-overlay.show.fade-in .letter-inner {
            opacity: 1; transform: translateY(0);
        }

        .letter-from-row { text-align: center; margin-bottom: 4px; }
        .letter-label { font-size: 0.7rem; color: #b09080; font-weight: 500; }

        .letter-from-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: #4a1e30;
            margin: 4px 0 2px;
        }

        .letter-to {
            text-align: center;
            font-size: 0.73rem;
            color: #b07a9e;
            font-weight: 500;
            margin-bottom: 12px;
        }

        .letter-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, #e0c0d0, transparent);
            margin: 0 auto 16px; width: 75%;
        }

        .letter-msg {
            font-size: 0.95rem;
            color: #4a2e3e;
            line-height: 1.8;
            text-align: center;
            white-space: pre-line;
            min-height: 50px;
            font-weight: 500;
            padding: 0 2px;
        }

        .type-cursor {
            display: inline-block;
            width: 2px; height: 1em;
            background: #ad1457;
            animation: blink 0.6s step-end infinite;
            vertical-align: text-bottom;
            margin-left: 1px;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .letter-sig {
            text-align: right;
            margin-top: 18px;
            padding-top: 10px;
            border-top: 1px dashed #e0c8d8;
        }

        .sig-emoji { font-size: 1.5rem; vertical-align: middle; margin-right: 4px; }

        .sig-name {
            font-family: 'Dancing Script', cursive;
            font-size: 1.1rem;
            color: #6a3050;
            font-weight: 700;
        }

        .letter-btns {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 18px;
            flex-wrap: wrap;
        }

        .btn-l {
            padding: 10px 20px;
            border: none;
            border-radius: 50px;
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            font-size: 0.82rem;
            cursor: pointer;
            min-height: 44px;
            min-width: 44px;
            transition: transform 0.15s ease;
        }

        .btn-l:active { transform: scale(0.94); }

        .btn-confetti {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #4a1e10;
            box-shadow: 0 3px 12px rgba(255,215,0,0.3);
        }

        .btn-back {
            background: linear-gradient(135deg, #e91e63, #ad1457);
            color: white;
            box-shadow: 0 3px 12px rgba(233,30,99,0.3);
        }

        .btn-x {
            position: absolute;
            top: -42px; right: 0;
            width: 38px; height: 38px;
            border-radius: 50%;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.18);
            color: white;
            font-size: 1.1rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            min-height: 44px; min-width: 44px;
        }

        .btn-x:active { background: rgba(255,255,255,0.25); }

        /* ============================================
           BOTTOM BAR
           ============================================ */
        .bottom-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 100;
            background: linear-gradient(0deg,
                rgba(9,0,23,0.97) 0%,
                rgba(9,0,23,0.77) 70%,
                transparent 100%);
            padding: 10px 16px 14px;
            padding-bottom: max(14px, calc(env(safe-area-inset-bottom) + 10px));
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px 12px;
            flex-wrap: wrap;
        }

        .bottom-meta {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 170px;
        }

        .bottom-text {
            font-size: 0.7rem;
            font-weight: 600;
            animation: softGlow 3s ease infinite;
        }

        .sync-status {
            font-size: 0.58rem;
            color: rgba(255,255,255,0.56);
            min-height: 0.9rem;
            line-height: 1.2;
        }
        .sync-status.info { color: rgba(220,232,255,0.86); }
        .sync-status.ok { color: rgba(188,255,217,0.9); }
        .sync-status.warn { color: rgba(255,212,218,0.92); }

        @keyframes softGlow {
            0%, 100% { color: rgba(255,200,220,0.35); }
            50% { color: rgba(255,200,220,0.8); }
        }

        .bottom-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }

        .btn-reload {
            border: 1px solid rgba(255,255,255,0.22);
            background: rgba(255,255,255,0.09);
            color: rgba(255,255,255,0.85);
            border-radius: 999px;
            font-size: 0.6rem;
            font-weight: 700;
            padding: 6px 12px;
            min-height: 34px;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease;
        }
        .btn-reload:active { transform: scale(0.95); }
        .btn-reload:disabled {
            opacity: 0.55;
            cursor: default;
            transform: none;
        }

        .badge-read {
            padding: 3px 10px;
            border-radius: 50px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            font-size: 0.6rem;
            color: rgba(255,255,255,0.5);
            font-weight: 600;
            white-space: nowrap;
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 480px) {
            .header-title {
                font-size: clamp(0.85rem, 4.2vw + 0.1rem, 1.16rem);
                line-height: 1.36;
                max-width: 97vw;
                padding: 0.14em 2px 0.06em;
            }
            .header-sub { font-size: 0.66rem; }
            .header-badge { font-size: 0.5rem; padding: 2px 9px; }
            .envelope {
                width: 124px;
                border-radius: 14px;
                padding: 10px 7px 8px;
            }
            .env-icon { font-size: 1.5rem; }
            .env-name { font-size: 0.68rem; }
            .caught-chip { font-size: 0.54rem; }
            .letter-wrapper { width: min(350px, 94vw); }
            .letter-inner { padding: 22px 16px 18px; }
            .letter-msg { font-size: 0.9rem; line-height: 1.65; }
            .btn-l { padding: 9px 16px; font-size: 0.78rem; }
            .bottom-text { font-size: 0.64rem; }
            .sync-status { font-size: 0.52rem; }
            .bottom-meta { min-width: 0; }
            .bottom-controls { width: 100%; justify-content: space-between; margin-left: 0; }
            .btn-reload { font-size: 0.54rem; padding: 5px 10px; min-height: 32px; }
            .badge-read { font-size: 0.56rem; }
        }

        @media (min-width: 500px) {
            .envelope { width: 145px; }
        }
        @media (min-width: 768px) {
            .envelope { width: 160px; }
        }

        .low-power body::before { animation: none; }
        .low-power .envelope {
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            background: rgba(255,255,255,0.12);
        }
        .low-power .envelope::after { filter: blur(8px); opacity: 0.25; }

        .paused .bg-petal,
        .paused .envelope,
        .paused .envelope::after,
        .paused .header-title,
        .paused .bottom-text {
            animation-play-state: paused !important;
        }

        @media (prefers-reduced-motion: reduce) {
            body::before,
            .header-title,
            .bottom-text,
            .bg-petal,
            .envelope::after,
            .type-cursor {
                animation: none !important;
            }

            .envelope,
            .caught-chip,
            .letter-wrapper,
            .letter-inner,
            .modal-overlay {
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

    <!-- Canvas sao nhấp nháy -->
    <canvas class="stars-canvas" id="starsCanvas"></canvas>

    <!-- Header cố định -->
    <header class="header">
        <h1 class="header-title">- 8/3 MỪNG NGÀY QUỐC TẾ PHỤ NỮ</h1>
        <span class="header-badge" id="headerBadge"></span>
    </header>

    <!-- Vùng rơi — full viewport -->
    <div class="fall-zone" id="fallZone"></div>

    <!-- Thanh phong bì đã bắt -->
    <div class="caught-tray" id="caughtTray"></div>

    <!-- Modal mở thư -->
    <div class="modal-overlay" id="modal">
        <div class="letter-wrapper" id="letterWrap">
            <button class="btn-x" id="btnX" aria-label="Đóng">✕</button>
            <div class="env-flap">
                <div class="env-flap-shape" id="flapShape"></div>
            </div>
            <div class="env-body">
                <span class="corner tl">🌸</span>
                <span class="corner tr">🌷</span>
                <span class="corner bl">🌹</span>
                <span class="corner br">🌺</span>
                <div class="letter-inner" id="letterInner">
                    <div class="letter-from-row">
                        <span class="letter-label">Từ</span>
                        <h3 class="letter-from-name" id="lName"></h3>
                    </div>
                    <p class="letter-to" id="lTo"></p>
                    <div class="letter-line"></div>
                    <p class="letter-msg" id="lMsg"></p>
                    <div class="letter-sig">
                        <span class="sig-emoji" id="lSigEmoji"></span>
                        <span class="sig-name" id="lSigName"></span>
                    </div>

    <script>
    // ============================================================
    // DỮ LIỆU DỰ PHÒNG (dùng khi chưa cấu hình URL hoặc lỗi mạng)
    // ============================================================
    const fallbackWishes = [
      {
        from: "Ban tổ chức",
        avatar: "🌸",
        color: "#ff6b9d",
        message: "Chào mừng ngày 8/3. Hãy dán CSV URL để web tự động lấy lời chúc từ Google Sheets.",
        to: "Tất cả các bạn nữ"
      },
      {
        from: "WebQR",
        avatar: "✨",
        color: "#c56cf0",
        message: "Sau khi dán CSV URL, nhấn 'Tải lại lời chúc' để đồng bộ dữ liệu mới nhất.",
        to: "Tất cả các bạn nữ"
      }
    ];
    const wishes = [...fallbackWishes];

    // ============================================
    // GOOGLE FORM / SHEET SYNC
    //
    // Cách dùng:
    // 1) Google Form -> "Liên kết tới Google Sheets"
    // 2) Trong Google Sheets, share "Anyone with the link - Viewer"
    // 3) Lấy link CSV dạng:
    //    https://docs.google.com/spreadsheets/d/<SHEET_ID>/export?format=csv&gid=<GID>
    // 4) Dán vào GOOGLE_SYNC.csvUrl bên dưới
    // ============================================
    const GOOGLE_SYNC = {
        enabled: true,
        csvUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRTh4saMOkoRXC-f-H5zLdeW46IcXz-3T0c3aR3hZz2AHS9c9CtfFc_9dNa78wyUfKZMZGBy5nMN44_/pub?gid=721584308&single=true&output=csv', // <-- dán URL CSV Google Sheet vào đây
        fromHeader: 'Tên người gửi lời chúc',
        messageHeader: 'Lời chúc dành cho các bạn nữ',
        timestampHeader: 'Timestamp',
        to: 'Tất cả các bạn nữ',
        autoRefreshMs: 45000,
        timestampDayFirst: true
    };

    const DYNAMIC_AVATARS = ['🌸', '💖', '✨', '🌷', '🎀', '💐', '🌟'];
    const DYNAMIC_COLORS = ['#ff6b9d', '#f78fb3', '#c56cf0', '#f8a5c2', '#f3a683', '#cf6a87'];

    // ============================================
    // BIẾN TOÀN CỤC
    // ============================================
    const STORAGE_KEY = 'webqr-read-v2';
    const readSet = new Set();
    let typingAbort = null;
    const fallZone = document.getElementById('fallZone');
    const caughtTray = document.getElementById('caughtTray');
    const syncStatusEl = document.getElementById('syncStatus');
    const btnReload = document.getElementById('btnReload');
    const activeEnvelopes = new Set();
    const activeIndices = new Set();
    const delayedSpawns = new Set();
    const SLOTS_PER_LANE = 3;
    const SLOT_PHASES = [];
    const SPAWN_GAP_MS = 560;
    const FALL_CYCLES_BEFORE_SWAP = 2;
    let spawnQueue = [];
    const slotMap = new Map(); // el -> { lane, slot }
    const laneSpeed = new Map(); // laneIndex -> fallDur
    let maxActive = 8;
    let starsCtrl = null;
    let petalsCtrl = null;
    let resizeRaf = 0;
    let lastViewport = { w: innerWidth, h: innerHeight };
    let syncInProgress = false;
    let autoRefreshTimer = 0;
    let lastSyncSignature = '';

    const mediaReduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
    const mediaCoarsePointer = window.matchMedia('(pointer: coarse)');
    const perf = {
        reducedMotion: false,
        coarsePointer: false,
        lowPower: false,
        memory: navigator.deviceMemory || 4,
        cores: navigator.hardwareConcurrency || 4
    };

    function random(min, max) { return min + Math.random() * (max - min); }

    function normalizeKey(value) {
        return String(value || '')
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, ' ')
            .trim();
    }

    function normalizeText(value) {
        return String(value || '')
            .replace(/\u00A0/g, ' ')
            .replace(/\s+/g, ' ')
            .trim();
    }

    function normalizeMessage(value) {
        return String(value || '')
            .replace(/\u00A0/g, ' ')
            .replace(/\r\n/g, '\n')
            .replace(/\r/g, '\n')
            .split('\n')
            .map((line) => line.replace(/[ \t]+/g, ' ').trim())
            .join('\n')
            .replace(/\n{3,}/g, '\n\n')
            .trim();
    }

    function parseTimestampMs(value, dayFirst) {
        const text = normalizeText(value);
        if (!text) return NaN;

        const m = text.match(/^(\d{1,2})[\/.\-](\d{1,2})[\/.\-](\d{2,4})(?:\s+(\d{1,2}):(\d{2})(?::(\d{2}))?)?$/);
        if (m) {
            const a = Number(m[1]);
            const b = Number(m[2]);
            let year = Number(m[3]);
            if (year < 100) year += 2000;

            let day = dayFirst ? a : b;
            let month = dayFirst ? b : a;
            if (a > 12 && b <= 12) { day = a; month = b; }
            if (b > 12 && a <= 12) { day = b; month = a; }

            const hour = Number(m[4] || 0);
            const minute = Number(m[5] || 0);
            const second = Number(m[6] || 0);
            const d = new Date(year, month - 1, day, hour, minute, second);
            if (!Number.isNaN(d.getTime()) &&
                d.getFullYear() === year &&
                d.getMonth() === month - 1 &&
                d.getDate() === day) {
                return d.getTime();
            }
        }

        const direct = Date.parse(text);
        return Number.isFinite(direct) ? direct : NaN;
    }

    function buildDedupeKey(timestamp, from, message) {
        return [normalizeKey(timestamp), normalizeKey(from), normalizeKey(message)].join('|');
    }

    function formatClock(ts) {
        return new Date(ts || Date.now()).toLocaleTimeString('vi-VN', {
            hour: '2-digit',
            minute: '2-digit'
        });
    }

    function setSyncStatus(text, tone) {
        if (!syncStatusEl) return;
        syncStatusEl.textContent = text;
        syncStatusEl.classList.remove('info', 'ok', 'warn');
        syncStatusEl.classList.add(tone || 'info');
    }

    function setReloadButtonBusy(isBusy) {
        if (!btnReload) return;
        btnReload.disabled = !!isBusy;
        btnReload.textContent = isBusy ? 'Đang tải...' : 'Tải lại lời chúc';
    }

    function clearReadProgress() {
        readSet.clear();
        caughtTray.innerHTML = '';
        try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    }

    function parseCsv(csvText) {
        const rows = [];
        const text = String(csvText || '').replace(/^\uFEFF/, '');
        let row = [];
        let cell = '';
        let inQuote = false;

        for (let i = 0; i < text.length; i++) {
            const ch = text[i];

            if (ch === '"') {
                if (inQuote && text[i + 1] === '"') {
                    cell += '"';
                    i++;
                } else {
                    inQuote = !inQuote;
                }
                continue;
            }

            if (ch === ',' && !inQuote) {
                row.push(cell.trim());
                cell = '';
                continue;
            }

            if ((ch === '\n' || ch === '\r') && !inQuote) {
                if (ch === '\r' && text[i + 1] === '\n') i++;
                row.push(cell.trim());
                if (row.some((v) => v.length > 0)) rows.push(row);
                row = [];
                cell = '';
                continue;
            }

            cell += ch;
        }

        row.push(cell.trim());
        if (row.some((v) => v.length > 0)) rows.push(row);
        return rows;
    }

    function findColumnIndex(headers, preferredLabel, fallbackTokens) {
        const normalizedHeaders = headers.map(normalizeKey);
        const preferred = normalizeKey(preferredLabel);
        let idx = normalizedHeaders.findIndex((h) => h === preferred);
        if (idx >= 0) return idx;

        idx = normalizedHeaders.findIndex((h) => fallbackTokens.every((t) => h.includes(t)));
        return idx;
    }

    function buildWish(from, message, idx) {
        return {
            from,
            message,
            to: GOOGLE_SYNC.to || 'Tất cả các bạn nữ',
            avatar: DYNAMIC_AVATARS[idx % DYNAMIC_AVATARS.length],
            color: DYNAMIC_COLORS[idx % DYNAMIC_COLORS.length]
        };
    }

    function replaceWishes(nextWishes) {
        wishes.length = 0;
        nextWishes.forEach((w) => wishes.push(w));
    }

    function stopAutoRefresh() {
        if (!autoRefreshTimer) return;
        clearInterval(autoRefreshTimer);
        autoRefreshTimer = 0;
    }

    function startAutoRefresh() {
        stopAutoRefresh();
        if (!GOOGLE_SYNC.enabled || !GOOGLE_SYNC.csvUrl) return;

        const intervalMs = Math.max(30000, Math.min(60000, Number(GOOGLE_SYNC.autoRefreshMs) || 45000));
        autoRefreshTimer = setInterval(() => {
            syncWishes({ showLoading: false, restartFalling: true, silent: true });
        }, intervalMs);
    }

    async function loadWishesFromGoogleSheet(options = {}) {
        const silent = !!options.silent;
        if (!GOOGLE_SYNC.enabled) {
            if (!silent) setSyncStatus('Đang tắt đồng bộ Google Sheet. Dùng dữ liệu dự phòng.', 'warn');
            return { ok: false, changed: false, reason: 'sync-disabled' };
        }
        if (!GOOGLE_SYNC.csvUrl) {
            if (!silent) setSyncStatus('Chưa dán CSV URL. Dùng dữ liệu dự phòng.', 'warn');
            return { ok: false, changed: false, reason: 'missing-csv-url' };
        }

        try {
            const res = await fetch(GOOGLE_SYNC.csvUrl, { cache: 'no-store' });
            if (!res.ok) throw new Error('HTTP ' + res.status);

            const csv = await res.text();
            const rows = parseCsv(csv);
            if (rows.length < 2) throw new Error('Sheet chưa có dữ liệu');

            const headers = rows[0];
            const fromIdx = findColumnIndex(headers, GOOGLE_SYNC.fromHeader, ['ten', 'gui', 'chuc']);
            const msgIdx = findColumnIndex(headers, GOOGLE_SYNC.messageHeader, ['loi', 'chuc']);
            let tsIdx = findColumnIndex(headers, GOOGLE_SYNC.timestampHeader, ['timestamp']);
            if (tsIdx < 0) tsIdx = findColumnIndex(headers, 'thoi gian', ['thoi', 'gian']);

            if (fromIdx < 0 || msgIdx < 0) {
                throw new Error('Không tìm thấy đúng cột tên/lời chúc');
            }

            const dayFirst = GOOGLE_SYNC.timestampDayFirst !== false;
            const seen = new Set();
            const imported = [];
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                const timestamp = tsIdx >= 0 ? normalizeText(row[tsIdx]) : '';
                const from = normalizeText(row[fromIdx]);
                const message = normalizeMessage(row[msgIdx]);
                if (!from || !message) continue;

                const dedupeKey = buildDedupeKey(timestamp, from, message);
                if (seen.has(dedupeKey)) continue;
                seen.add(dedupeKey);

                imported.push({
                    from,
                    message,
                    rowIndex: i,
                    timestampMs: parseTimestampMs(timestamp, dayFirst),
                    dedupeKey
                });
            }

            if (!imported.length) throw new Error('Không có dòng hợp lệ');

            imported.sort((a, b) => {
                const at = Number.isFinite(a.timestampMs) ? a.timestampMs : -Infinity;
                const bt = Number.isFinite(b.timestampMs) ? b.timestampMs : -Infinity;
                if (at !== bt) return bt - at;
                return b.rowIndex - a.rowIndex;
            });

            const signature = imported.map((item) => item.dedupeKey).join('||');
            if (signature === lastSyncSignature) {
                if (!silent) setSyncStatus('Đã đồng bộ ' + imported.length + ' lời chúc lúc ' + formatClock(), 'ok');
                return { ok: true, changed: false, count: imported.length };
            }

            const mapped = imported.map((item, idx) => buildWish(item.from, item.message, idx));
            replaceWishes(mapped);
            lastSyncSignature = signature;
            if (!silent) setSyncStatus('Đã tải ' + mapped.length + ' lời chúc lúc ' + formatClock(), 'ok');
            return { ok: true, changed: true, count: mapped.length };
        } catch (err) {
            console.warn('[GOOGLE_SYNC] Không tải được dữ liệu, dùng fallback:', err);
            if (!silent) setSyncStatus('Link Sheet lỗi hoặc chưa public. Đang dùng dữ liệu dự phòng.', 'warn');
            return { ok: false, changed: false, error: err };
        }
    }

    async function syncWishes(options = {}) {
        const manual = !!options.manual;
        const showLoading = options.showLoading !== false;
        const restartFalling = !!options.restartFalling;
        const silent = !!options.silent;

        if (syncInProgress) return { ok: false, changed: false, reason: 'sync-busy' };
        syncInProgress = true;
        if (manual) setReloadButtonBusy(true);
        if (showLoading && !silent) setSyncStatus('Đang tải lời chúc...', 'info');

        try {
            const result = await loadWishesFromGoogleSheet({ silent });
            if (result.changed) {
                clearReadProgress();
                updateBadge();
                updateHeaderBadge();
                if (silent) setSyncStatus('Đã cập nhật ' + wishes.length + ' lời chúc lúc ' + formatClock(), 'ok');
                if (restartFalling) startFalling();
            } else {
                updateHeaderBadge();
                updateBadge();
            }
            return result;
        } finally {
            if (manual) setReloadButtonBusy(false);
            syncInProgress = false;
        }
    }

    function getEnvelopeWidth() {
        return innerWidth < 400 ? 124 : (innerWidth < 600 ? 145 : 160);
    }

    function computeMaxActive() {
        const base = Math.floor(innerWidth / (perf.coarsePointer ? 122 : 112));
        const min = perf.lowPower ? 4 : 6;
        const max = perf.lowPower ? 9 : 12;
        return Math.min(max, Math.max(min, base));
    }

    function refreshPerfFlags() {
        const smallestEdge = Math.min(innerWidth, innerHeight);
        perf.reducedMotion = mediaReduceMotion.matches;
        perf.coarsePointer = mediaCoarsePointer.matches;
        perf.lowPower = perf.reducedMotion || perf.memory <= 4 || perf.cores <= 4 || smallestEdge < 420;
        maxActive = computeMaxActive();
        document.documentElement.classList.toggle('low-power', perf.lowPower);
    }

    function scheduleSpawn(delay) {
        const timer = setTimeout(() => {
            delayedSpawns.delete(timer);
            spawnNext();
        }, delay);
        delayedSpawns.add(timer);
    }

    function clearDelayedSpawns() {
        delayedSpawns.forEach(clearTimeout);
        delayedSpawns.clear();
    }

    function saveReadState() {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify([...readSet])); } catch (e) {}
    }

    function loadReadState() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return;
            const parsed = JSON.parse(raw);
            if (!Array.isArray(parsed)) return;
            parsed.forEach((idx) => {
                if (Number.isInteger(idx) && idx >= 0 && idx < wishes.length) readSet.add(idx);
            });
        } catch (e) {}
    }

    // ============================================
    // CANVAS SAO NHẤP NHÁY
    // ============================================
    function initStars() {
        const cvs = document.getElementById('starsCanvas');
        const ctx = cvs.getContext('2d', { alpha: true, desynchronized: true });
        if (!ctx) return { start: () => {}, stop: () => {}, refresh: () => {} };

        let stars = [];
        let meteors = [];
        let running = false;
        let rafId = 0;
        let width = innerWidth;
        let height = innerHeight;
        let dpr = 1;
        let lastTs = 0;
        let nextMeteorAt = 0;

        function starCount() {
            const area = width * height;
            const density = perf.lowPower ? 0.0001 : 0.00015;
            const min = perf.lowPower ? 70 : 95;
            const max = perf.lowPower ? 140 : 220;
            return Math.min(max, Math.max(min, Math.round(area * density)));
        }

        function rebuildStars() {
            const count = starCount();
            stars = [];
            for (let i = 0; i < count; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    r: random(0.35, perf.lowPower ? 1.25 : 1.55),
                    base: random(0.22, 0.65),
                    twinkle: random(0.08, 0.34),
                    speed: random(0.0012, 0.0033),
                    offset: Math.random() * Math.PI * 2
                });
            }
        }

        function resize() {
            width = innerWidth;
            height = innerHeight;
            dpr = Math.min(window.devicePixelRatio || 1, perf.lowPower ? 1.5 : 2);
            cvs.width = Math.max(1, Math.round(width * dpr));
            cvs.height = Math.max(1, Math.round(height * dpr));
            cvs.style.width = width + 'px';
            cvs.style.height = height + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            rebuildStars();
        }

        function drawStars(ts) {
            for (const s of stars) {
                const alpha = s.base + Math.sin(ts * s.speed + s.offset) * s.twinkle;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${Math.max(0.04, Math.min(1, alpha))})`;
                ctx.fill();
            }
        }

        function scheduleMeteor(ts) {
            const minDelay = perf.lowPower ? 4300 : 2500;
            const maxDelay = perf.lowPower ? 7600 : 5000;
            nextMeteorAt = ts + random(minDelay, maxDelay);
        }

        function spawnMeteor(ts) {
            if (perf.reducedMotion) {
                scheduleMeteor(ts);
                return;
            }

            const burst = perf.lowPower ? 1 : (Math.random() < 0.34 ? 2 : 1);
            for (let i = 0; i < burst; i++) {
                const angle = random(Math.PI / 8, Math.PI / 5.4);
                const dx = Math.cos(angle);
                const dy = Math.sin(angle);
                const speed = perf.lowPower ? random(520, 700) : random(650, 910);
                meteors.push({
                    x: random(-width * 0.2, width * 0.72) - i * random(18, 44),
                    y: random(-32, height * 0.34) + i * random(8, 26),
                    dx,
                    dy,
                    vx: dx * speed,
                    vy: dy * speed,
                    len: perf.lowPower ? random(68, 108) : random(92, 154),
                    life: 0,
                    maxLife: random(650, 1100),
                    alpha: random(0.68, 0.96)
                });
            }

            const cap = perf.lowPower ? 4 : 6;
            while (meteors.length > cap) meteors.shift();
            scheduleMeteor(ts);
        }

        function drawMeteors(dt) {
            for (let i = meteors.length - 1; i >= 0; i--) {
                const m = meteors[i];
                m.life += dt;
                m.x += m.vx * (dt / 1000);
                m.y += m.vy * (dt / 1000);

                if (m.life >= m.maxLife || m.x - m.len > width || m.y - m.len > height) {
                    meteors.splice(i, 1);
                    continue;
                }

                const fadeIn = Math.min(1, m.life / 110);
                const fadeOut = Math.min(1, (m.maxLife - m.life) / 260);
                const alpha = m.alpha * Math.max(0.04, Math.min(fadeIn, fadeOut));
                const tx = m.x - m.dx * m.len;
                const ty = m.y - m.dy * m.len;
                const grad = ctx.createLinearGradient(m.x, m.y, tx, ty);
                grad.addColorStop(0, `rgba(255,255,255,${alpha})`);
                grad.addColorStop(0.4, `rgba(255,234,194,${alpha * 0.75})`);
                grad.addColorStop(1, 'rgba(255,255,255,0)');

                ctx.beginPath();
                ctx.moveTo(tx, ty);
                ctx.lineTo(m.x, m.y);
                ctx.lineWidth = perf.lowPower ? 1.4 : 1.8;
                ctx.strokeStyle = grad;
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(m.x, m.y, perf.lowPower ? 1.25 : 1.6, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${Math.min(1, alpha + 0.15)})`;
                ctx.fill();
            }
        }

        function frame(ts) {
            if (!running) return;
            if (!lastTs) lastTs = ts;
            const dt = Math.min(40, ts - lastTs);
            lastTs = ts;

            ctx.clearRect(0, 0, width, height);
            drawStars(ts);

            if (!perf.reducedMotion) {
                if (ts >= nextMeteorAt) spawnMeteor(ts);
                drawMeteors(dt);
            }

            rafId = requestAnimationFrame(frame);
        }

        function drawStaticSky() {
            ctx.clearRect(0, 0, width, height);
            drawStars(performance.now());
        }

        function start() {
            if (running || document.hidden) return;
            running = true;
            lastTs = 0;
            if (!nextMeteorAt) scheduleMeteor(performance.now());
            rafId = requestAnimationFrame(frame);
        }

        function stop() {
            running = false;
            if (rafId) {
                cancelAnimationFrame(rafId);
                rafId = 0;
            }
        }

        function refresh() {
            stop();
            meteors = [];
            resize();
            if (perf.reducedMotion) drawStaticSky();
            else {
                scheduleMeteor(performance.now());
                start();
            }
        }

        resize();
        if (perf.reducedMotion) drawStaticSky();
        else start();

        return { start, stop, refresh };
    }

    // ============================================
    // HOA NỀN TRÔI NHẸ
    // ============================================
    function initPetals() {
        const items = ['🌸', '🌹', '🌷', '💐', '🌺'];
        let timer = 0;
        let running = false;
        let activePetals = 0;

        function maxPetals() {
            if (perf.reducedMotion) return 0;
            return perf.lowPower ? 3 : 7;
        }

        function spawn(force = false) {
            if ((!running && !force) || perf.reducedMotion) return;
            if (activePetals >= maxPetals()) return;

            const el = document.createElement('div');
            const duration = random(perf.lowPower ? 24 : 18, perf.lowPower ? 36 : 30);
            el.className = 'bg-petal';
            el.textContent = items[Math.floor(Math.random() * items.length)];
            el.style.left = random(-3, 98) + 'vw';
            el.style.bottom = '-24px';
            el.style.fontSize = random(perf.lowPower ? 9 : 10, perf.lowPower ? 15 : 20) + 'px';
            el.style.animationDuration = duration.toFixed(2) + 's';
            el.style.animationDelay = random(0, 1.8).toFixed(2) + 's';
            document.body.appendChild(el);

            activePetals++;
            setTimeout(() => {
                if (el.parentNode) el.remove();
                activePetals = Math.max(0, activePetals - 1);
            }, (duration + 2) * 1000);
        }

        function schedule() {
            clearTimeout(timer);
            if (!running || perf.reducedMotion) return;
            const next = random(perf.lowPower ? 3500 : 2300, perf.lowPower ? 6200 : 4300);
            timer = setTimeout(() => {
                spawn();
                schedule();
            }, next);
        }

        function start() {
            if (running || perf.reducedMotion || document.hidden) return;
            running = true;
            const burst = perf.lowPower ? 2 : 5;
            for (let i = 0; i < burst; i++) {
                setTimeout(() => spawn(true), i * 250);
            }
            schedule();
        }

        function stop(removeExisting = false) {
            running = false;
            clearTimeout(timer);
            timer = 0;
            if (removeExisting) {
                document.querySelectorAll('.bg-petal').forEach((el) => el.remove());
                activePetals = 0;
            }
        }

        function refresh() {
            if (perf.reducedMotion) {
                stop(true);
                return;
            }
            if (!running && !document.hidden) start();
            else schedule();
        }

        start();
        return { start, stop, refresh };
    }

    // ============================================
    // XÁO TRỘN FISHER-YATES
    // ============================================
    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    // ============================================
    // TẠO 1 PHONG BÌ RƠI
    // ============================================
    function spawnEnvelope(idx) {
        if (idx < 0 || idx >= wishes.length) return;
        const w = wishes[idx];
        const envW = getEnvelopeWidth();

        const el = document.createElement('div');
        el.className = 'envelope';
        el.dataset.idx = idx;
        el.setAttribute('role', 'button');
        el.setAttribute('aria-label', 'Mở thư của ' + w.from);

        const slot = pickSlot(envW);
        if (slot === null) return;
        el.style.left = slot.left + 'px';
        slotMap.set(el, { lane: slot.lane, slot: slot.slot });
        el.style.width = envW + 'px';

        const laneDur = laneSpeed.get(slot.lane) ?? random(perf.lowPower ? 12.5 : 11, perf.lowPower ? 18.8 : 16.8).toFixed(1);
        laneSpeed.set(slot.lane, laneDur);
        const fallDur = laneDur;
        const swayDur = random(5.5, 9.8).toFixed(1);
        const sx = () => random(-9, 9).toFixed(0);
        const rot = random(-2.4, 2.4).toFixed(1);

        el.style.setProperty('--fall-dur', fallDur + 's');
        el.style.setProperty('--fall-delay', (-slot.phase * parseFloat(fallDur)).toFixed(2) + 's');
        el.style.setProperty('--sway-dur', swayDur + 's');
        el.style.setProperty('--sway-delay', random(-3, 0).toFixed(1) + 's');
        el.style.setProperty('--r0', rot + 'deg');
        el.style.setProperty('--sx1', sx() + 'px');
        el.style.setProperty('--sx2', sx() + 'px');
        el.style.setProperty('--sx3', sx() + 'px');
        el.style.setProperty('--glow', w.color + '88');
        el.style.setProperty('--glow-dim', w.color + '33');
        el.style.setProperty('--glow-d', random(-3, 0).toFixed(1) + 's');

        if (readSet.has(idx)) el.classList.add('read');

        el.innerHTML = `
            <span class="env-icon">${w.avatar}</span>
            <span class="env-mail">✉️</span>
            <span class="env-name">${w.from}</span>
            <span class="env-hint">bắt lấy!</span>
        `;

        fallZone.appendChild(el);
        activeEnvelopes.add(el);
        activeIndices.add(idx);
        updateHeaderBadge();
        requestAnimationFrame(() => el.classList.add('spawned'));

        let cycles = 0;
        el.addEventListener('animationiteration', (e) => {
            if (e.animationName !== 'envFall') return;
            if (readSet.has(idx)) el.classList.add('read');
            cycles++;

            if (cycles >= FALL_CYCLES_BEFORE_SWAP) {
                activeEnvelopes.delete(el);
                activeIndices.delete(idx);
                freeSlot(el);
                el.remove();
                updateHeaderBadge();
                scheduleSpawn(perf.lowPower ? 380 : 260);
            }
        });
    }

    // ============================================
    // LUỒNG SPAWN PHONG BÌ
    // Ưu tiên mượt trên mobile và phân bổ ngẫu nhiên
    // ============================================
    function refillQueue() {
        const n = wishes.length;
        spawnQueue = shuffle([...Array(n).keys()].filter((i) => !activeIndices.has(i)));
    }

    function spawnNext() {
        if (activeIndices.size >= maxActive) return;
        if (!hasFreeSlot()) return;
        if (!spawnQueue.length) refillQueue();
        if (!spawnQueue.length) return;
        const idx = spawnQueue.shift();
        if (activeIndices.has(idx)) return spawnNext();
        spawnEnvelope(idx);
    }

    function updateHeaderBadge() {
        const badge = document.getElementById('headerBadge');
        if (!badge) return;
        const active = activeIndices.size;
        badge.textContent = active + '/' + wishes.length + ' lời chúc';
    }

    function clearActiveEnvelopes() {
        activeEnvelopes.forEach((el) => {
            if (el.parentNode) el.remove();
        });
        activeEnvelopes.clear();
        activeIndices.clear();
        slotMap.clear();
    }

    function seedWave() {
        clearDelayedSpawns();
        const initialCount = Math.min(maxActive, wishes.length);
        for (let i = 0; i < initialCount; i++) {
            scheduleSpawn(i * SPAWN_GAP_MS);
        }
        updateHeaderBadge();
        updateBadge();
    }

    function startFalling() {
        clearActiveEnvelopes();
        laneSpeed.clear();
        refillQueue();
        seedWave();
    }

    function getLaneCount(envW) {
        const usableWidth = Math.max(0, innerWidth - envW - 20);
        const desiredGap = perf.coarsePointer ? 128 : 144;
        const auto = Math.floor(usableWidth / desiredGap) + 1;
        return Math.min(4, Math.max(2, auto));
    }

    function buildLanes(envW) {
        const minLeft = 10;
        const maxLeft = Math.max(10, innerWidth - envW - 10);
        const count = getLaneCount(envW);
        const lanes = [];

        if (count === 1 || maxLeft <= minLeft) {
            lanes.push({ index: 0, left: (minLeft + maxLeft) / 2 });
            return lanes;
        }

        const step = (maxLeft - minLeft) / (count - 1);
        for (let i = 0; i < count; i++) {
            lanes.push({ index: i, left: minLeft + i * step });
        }
        return lanes;
    }

    function phaseForSlot(slotIdx) {
        if (SLOT_PHASES[slotIdx] != null) return SLOT_PHASES[slotIdx];
        return (slotIdx + 0.2) / SLOTS_PER_LANE;
    }

    function buildSlots(envW) {
        const lanes = buildLanes(envW);
        const slots = [];
        for (const lane of lanes) {
            for (let s = 0; s < SLOTS_PER_LANE; s++) {
                slots.push({
                    id: lane.index + '-' + s,
                    lane: lane.index,
                    slot: s,
                    left: lane.left,
                    phase: phaseForSlot(s)
                });
            }
        }
        return slots;
    }

    function getUsedSlots() {
        const used = new Set();
        slotMap.forEach((info, el) => {
            if (document.body.contains(el)) used.add(info.lane + '-' + info.slot);
        });
        return used;
    }

    function hasFreeSlot() {
        const slots = buildSlots(getEnvelopeWidth());
        const used = getUsedSlots();
        return slots.some((s) => !used.has(s.id));
    }

    function pickSlot(envW) {
        const slots = buildSlots(envW);
        const used = getUsedSlots();
        const available = slots.filter((s) => !used.has(s.id));
        if (!available.length) return null;
        return available[Math.floor(Math.random() * available.length)];
    }

    function freeSlot(el) {
        slotMap.delete(el);
    }

    // ============================================
    // MỞ THƯ
    // ============================================
    function openLetter(idx) {
        if (!Number.isInteger(idx) || idx < 0 || idx >= wishes.length) return;
        const w = wishes[idx];
        const modal = document.getElementById('modal');
        const wrap = document.getElementById('letterWrap');

        readSet.add(idx);
        saveReadState();
        document.querySelectorAll(`.envelope[data-idx="${idx}"]`).forEach((e) => e.classList.add('read'));
        updateBadge();
        addCaughtChip(idx);

        document.getElementById('flapShape').style.background =
            `linear-gradient(135deg, ${w.color}, ${shade(w.color, -25)})`;

        document.querySelector('.env-body').style.boxShadow =
            `0 20px 60px rgba(0,0,0,0.5), 0 0 40px ${w.color}44`;

        document.getElementById('lName').textContent = w.from + ' 💌';
        document.getElementById('lTo').textContent = 'Gửi: ' + w.to + ' 🌸';
        document.getElementById('lSigEmoji').textContent = w.avatar;
        document.getElementById('lSigName').textContent = w.from;

        const msgEl = document.getElementById('lMsg');
        msgEl.textContent = '';

        wrap.classList.remove('closing');
        modal.classList.add('show');
        requestAnimationFrame(() => {
            requestAnimationFrame(() => modal.classList.add('fade-in'));
        });

        if (typingAbort) typingAbort();
        const typingSpeed = perf.coarsePointer ? 24 : 20;
        const delay = perf.reducedMotion ? 90 : 800;
        setTimeout(() => {
            typingAbort = typewriter(msgEl, w.message, typingSpeed, () => miniConfetti());
        }, delay);
    }

    // ============================================
    // ĐÓNG THƯ
    // ============================================
    function closeLetter() {
        const modal = document.getElementById('modal');
        const wrap = document.getElementById('letterWrap');
        if (typingAbort) { typingAbort(); typingAbort = null; }

        wrap.classList.add('closing');
        modal.classList.remove('fade-in');

        setTimeout(() => {
            modal.classList.remove('show');
            wrap.classList.remove('closing');
        }, 330);
    }

    document.getElementById('btnX').addEventListener('click', closeLetter);
    document.getElementById('btnBack').addEventListener('click', closeLetter);
    document.getElementById('modal').addEventListener('click', function(e) {
        if (e.target === this) closeLetter();
    });
    document.getElementById('btnFirework').addEventListener('click', bigConfetti);
    if (btnReload) {
        btnReload.addEventListener('click', () => {
            syncWishes({ manual: true, showLoading: true, restartFalling: true });
        });
    }

    fallZone.addEventListener('click', (e) => {
        const env = e.target.closest('.envelope');
        if (!env) return;
        openLetter(Number(env.dataset.idx));
    });

    caughtTray.addEventListener('click', (e) => {
        const chip = e.target.closest('.caught-chip');
        if (!chip) return;
        openLetter(Number(chip.dataset.ci));
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeLetter();
    });

    // ============================================
    // THANH PHONG BÌ ĐÃ BẮT (caught chips)
    // ============================================
    function addCaughtChip(idx) {
        if (caughtTray.querySelector(`[data-ci="${idx}"]`)) return;

        const w = wishes[idx];
        const chip = document.createElement('div');
        chip.className = 'caught-chip';
        chip.dataset.ci = idx;
        chip.textContent = w.avatar + ' ' + w.from;
        chip.style.borderColor = w.color + '55';
        caughtTray.appendChild(chip);

        requestAnimationFrame(() => {
            caughtTray.scrollLeft = caughtTray.scrollWidth;
        });
    }

    // ============================================
    // TYPEWRITER
    // ============================================
    function typewriter(el, text, speed, done) {
        if (perf.reducedMotion) {
            el.textContent = text;
            if (done) done();
            return () => {};
        }

        let i = 0, stopped = false;
        const cur = document.createElement('span');
        cur.className = 'type-cursor';

        function tick() {
            if (stopped) return;
            if (i < text.length) {
                el.textContent = text.substring(0, i + 1);
                el.appendChild(cur);
                i++;
                setTimeout(tick, speed);
            } else {
                setTimeout(() => { if (cur.parentNode) cur.remove(); }, 700);
                if (done) done();
            }
        }
        tick();
        return function() { stopped = true; el.textContent = text; if (cur.parentNode) cur.remove(); };
    }

    // ============================================
    // CONFETTI
    // ============================================
    function miniConfetti() {
        if (perf.reducedMotion || typeof confetti !== 'function') return;
        confetti({
            particleCount: perf.lowPower ? 24 : 42,
            spread: perf.lowPower ? 45 : 58,
            origin: { y: 0.65 },
            colors: ['#ff6b9d','#a29bfe','#fd79a8','#ffd700','#55efc4','#ff80ab'],
            disableForReducedMotion: true
        });
    }

    function bigConfetti() {
        if (perf.reducedMotion || typeof confetti !== 'function') return;
        const end = Date.now() + (perf.lowPower ? 1300 : 2000);
        const c = ['#ff6b9d','#a29bfe','#fd79a8','#ffd700','#55efc4','#e91e63','#ff80ab','#f06292'];
        (function go() {
            confetti({
                particleCount: perf.lowPower ? 3 : 5,
                angle: 60,
                spread: perf.lowPower ? 42 : 52,
                origin: { x: 0 },
                colors: c,
                disableForReducedMotion: true
            });
            confetti({
                particleCount: perf.lowPower ? 3 : 5,
                angle: 120,
                spread: perf.lowPower ? 42 : 52,
                origin: { x: 1 },
                colors: c,
                disableForReducedMotion: true
            });
            if (Date.now() < end) requestAnimationFrame(go);
        })();
    }

    // ============================================
    // BADGE ĐÃ ĐỌC
    // ============================================
    function updateBadge() {
        document.getElementById('badgeRead').textContent =
            'Đã bắt: ' + readSet.size + '/' + wishes.length;
    }

    // ============================================
    // SHADE MÀU
    // ============================================
    function shade(hex, pct) {
        let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
        r = Math.min(255, Math.max(0, r + Math.round(r*pct/100)));
        g = Math.min(255, Math.max(0, g + Math.round(g*pct/100)));
        b = Math.min(255, Math.max(0, b + Math.round(b*pct/100)));
        return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
    }

    function setPausedState(paused) {
        document.documentElement.classList.toggle('paused', paused);
        if (paused) {
            if (starsCtrl) starsCtrl.stop();
            if (petalsCtrl) petalsCtrl.stop(false);
        } else {
            if (starsCtrl) starsCtrl.start();
            if (petalsCtrl) petalsCtrl.refresh();
        }
    }

    function handleVisibilityChange() {
        setPausedState(document.hidden);
    }

    function handleResize() {
        if (resizeRaf) return;
        resizeRaf = requestAnimationFrame(() => {
            resizeRaf = 0;
            const current = { w: innerWidth, h: innerHeight };
            const widthShift = Math.abs(current.w - lastViewport.w);
            const orientationChanged = (current.w > current.h) !== (lastViewport.w > lastViewport.h);
            lastViewport = current;

            refreshPerfFlags();
            if (starsCtrl) starsCtrl.refresh();
            if (petalsCtrl) petalsCtrl.refresh();

            if (widthShift >= 24 || orientationChanged) startFalling();
        });
    }

    // ============================================
    // KHỞI CHẠY
    // ============================================
    document.addEventListener('DOMContentLoaded', async () => {
        refreshPerfFlags();
        await syncWishes({ showLoading: true, restartFalling: false });
        loadReadState();
        [...readSet].sort((a, b) => a - b).forEach(addCaughtChip);
        updateBadge();

        starsCtrl = initStars();
        petalsCtrl = initPetals();
        startFalling();
        startAutoRefresh();

        document.addEventListener('visibilitychange', handleVisibilityChange);
        window.addEventListener('resize', handleResize, { passive: true });
        window.addEventListener('beforeunload', stopAutoRefresh);
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', handleResize, { passive: true });
        }

        mediaReduceMotion.addEventListener('change', () => {
            refreshPerfFlags();
            if (starsCtrl) starsCtrl.refresh();
            if (petalsCtrl) petalsCtrl.refresh();
            startFalling();
        });

        mediaCoarsePointer.addEventListener('change', () => {
            refreshPerfFlags();
            laneSpeed.clear();
            startFalling();
        });
    });
    </script>
</body>
